# 🍦 McBroken — U.S. Ice Cream Machine Status Map

An interactive data visualization of McDonald's ice cream machine outages across the United States, built for a Data Visualisation coursework project.

**Live site:** `https://[your-username].github.io/mcbroken-viz/`

## What it shows

- **Choropleth map** of all 50 U.S. states, color-coded by:
  - **Broken Rate (%)** — what fraction of machines are currently down
  - **Total Locations** — how many McDonald's are in each state
- **Drill-down**: click any state to zoom in and see individual location dots (green = working, red = broken)
- **City leaderboard** — top 20 worst cities by broken rate
- **Live stats** — global totals scraped at page load time

## Data source

Data from [mcbroken.com](https://mcbroken.com) by [@rashiq](https://twitter.com/rashiq), who reverse-engineered McDonald's internal ordering API and places a ~$18,752 order every minute at every U.S. location to detect broken machines.

The `state_data.js` and `locations_data.js` files were generated by fetching `https://data.mcbroken.com/markers.json` on **April 26, 2026**.

## Deploy to GitHub Pages

1. **Fork or clone** this repo
2. Push to a GitHub repo (e.g. `mcbroken-viz`)
3. Go to **Settings → Pages**
4. Set source to **Deploy from a branch → main → / (root)**
5. Your site will be live at `https://[username].github.io/mcbroken-viz/`

## To refresh the data

```bash
python3 scrape.py
```

This re-fetches `markers.json` and `stats.json` and regenerates the JS data files.

## Tech stack

- **D3.js v7** — choropleth rendering, zoom, projection
- **TopoJSON** — U.S. state geometry (us-atlas)
- **Canvas API** — high-performance dot rendering at zoom
- **Vanilla JS + CSS** — no build step required

## File structure

```
index.html          Main page
style.css           All styles
map.js              Choropleth + zoom + dot layer
stats.js            Stat cards + city table
state_data.js       Aggregated per-state data (generated)
locations_data.js   Individual location coordinates (generated)
scrape.py           Data refresh script
```
